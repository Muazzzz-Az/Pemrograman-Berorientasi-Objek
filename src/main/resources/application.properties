# ===== SafeTrack Backend Configuration =====

# Server
server.port=8080

# Database (ganti sesuai setup lokal kalian)
spring.datasource.url=jdbc:postgresql://localhost:5432/safetrack_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# File upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# SafeTrack custom config
safetrack.upload-dir=uploads/
safetrack.base-url=http://localhost:8080

# Auditing (untuk @CreatedDate)
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
